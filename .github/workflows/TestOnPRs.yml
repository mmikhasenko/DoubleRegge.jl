name: Test on PRs

on:
  pull_request:
    branches:
      - master
    paths:
      - "src/**"
      - "test/**"
      - "*.toml"
      - ".github/workflows/**"
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  test:
    uses: ./.github/workflows/ReusableTest.yml
    with:
      os: ubuntu-latest
      version: "1.11.5"
      arch: x64
      allow_failure: false
      run_codecov: true
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}
